<!DOCTYPE html>
<!-- cse6242 -->

<!-- run: http-server & -->

<head>
  <style>    
    /* Define css rules here */
    body {
      font-family: sans-serif;
    }
  </style>
<title>Wildlife Trafficking Incidents per Species (2015 to 2023)</title>
</head>

<body>

  <script src="lib/d3/d3.min.js"></script>
  <script src="lib/d3-dsv/d3-dsv.min.js"></script>
  <script src="lib/d3-fetch/d3-fetch.min.js"></script>


  <script>
    // define the dimensions and margins for the graph
    var margin = { top: 60, right: 40, bottom: 60, left: 180 };
    var width = 900;
    var height = 370;


    // create scales x & y for X and Y axis and set their ranges
    var x = d3.scaleLinear()
      .range([0, width - margin.left - margin.right]);
    var y = d3.scaleBand()
      .range([0, height - margin.top - margin.bottom])
      .padding(0.2);


    // append svg element to the body of the page
    var svg = d3.select("body")
    .append("svg")
    .attr("id", "svg1")
    .attr("width", width)
    .attr("height", height)
    .append("g")
    .attr("id", "container")
    .attr("transform", `translate(${margin.left}, ${margin.top})`);


    // Get the data and filter for top 5 most trafficked species
	  var pathToCsv = "q3.csv";		// path to csv
	
    d3.dsv(",", pathToCsv, function (d) {
      return {
        species: d.species,
        count: +d.count
        // format data attributes if required
      }
    }).then(function (data) {
      console.log(data); // you should see the data in your browser's developer tools console 
      
      /* Create bar plot using data from csv */

      // set the domains of X and Y scales based on data
      var slicedData = data.slice(0, 5)
      x.domain([0, d3.max(slicedData, d => d.count)]);
      y.domain(slicedData.map(d => d.species));

      // Add bars to svg - create new elements based on your data
      var colors = [
      "#648FFF",
      "#FFB000",
      "#DC267F",
      "#FE6100",
      "#785EF0"
      ];

      // --- ADD BARS USING svg.append ---
      var bars = svg.append("g")  // <--- appended to svg, not container
        .attr("id", "bars")
        .attr("transform", `translate(${margin.left},${margin.top})`);

      bars.selectAll("rect")
        .data(slicedData)
        .enter()
        .append("rect")
        .attr("x", 0)
        .attr("y", d => y(d.species))
        .attr("width", d => x(d.count))
        .attr("height", y.bandwidth())
        .attr("fill", (d, i) => colors[i]);

      // x-axis group
      var xAxis = svg.append("g")
        .attr("id", "x_axis")
        .attr("transform", `translate(${margin.left},${height - margin.bottom})`)
        .call(d3.axisBottom(x));

      // Add the text label for X Axis
      svg.append("text")
        .attr("id", "x_axis_label")
        .attr("x", (width - margin.left - margin.right) / 2)
        .attr("y", height - margin.top - margin.bottom + 45)
        .attr("text-anchor", "middle")
        .attr("class", "axis-label")
        .text("Count")

      // Add the Y Axis
      var yAxis = svg.append("g")
        .attr("id", "y_axis")
        .attr("transform", `translate(${margin.left},${margin.top})`)
        .call(d3.axisLeft(y));

      // Add the text label for Y axis
      svg.append("text")
      .attr("id", "y_axis_label")
      .attr("x", -margin.left + 20)
      .attr("y", -20)
      .attr("text-anchor", "start")
      .attr("class", "axis-label")
      .text("Species");

      // Add GT username
      svg.append("text")
        .attr("id", "credit")
        .attr("x", width)
        .attr("y", height - margin.top - margin.bottom + 40)
        .attr("text-anchor", "end")
        .attr("font-size", "10px")
        .text("kpalit3")

      // Add Title
      svg.append("text")
        .attr("id", "title") 
        .attr("x", (width - margin.left - margin.right) / 2)
        .attr("y", -30)
        .attr("text-anchor", "middle")
        .attr("font-size", "18px")
        .attr("font-weight", "bold")
        .text("Wildlife Trafficking Incidents per Species (2015 to 2023)")


    }).catch(function (error) {
      console.log(error);
    });

  </script>
</body>
